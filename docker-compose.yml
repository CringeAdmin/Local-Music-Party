services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON=${SUPABASE_ANON}
    command: >
      /bin/sh -c "
      echo \"window.SUPABASE_URL = '$$SUPABASE_URL'; window.SUPABASE_ANON = '$$SUPABASE_ANON';\" > /usr/share/nginx/html/js/config.js &&
      nginx -g 'daemon off;'
      "